# --- 認証：Dドライブの最新クッキー ---
--cookies "D:/yt-dlp/cookies.txt"

# --- 最新のSABR制限を回避するための設定 ---
--js-runtimes node
--extractor-args "youtube:player-client=ios,tv,web;player-params=2"

# --- 画質と変換 (RTX 5070 Ti 専用) ---
-f "bestvideo+bestaudio/best"
--merge-output-format mp4
--postprocessor-args "ffmpeg:-c:v h264_nvenc -preset p7 -tune hq -rc vbr -cq 17 -b:v 0 -c:a copy"

# --- トラブル回避 ---
--no-mtime
--console-title
--no-cache-dir
--mark-watched